<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imposter Game</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

button, input {
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

.hidden { display: none; }

#categoryList div {
  margin: 5px 0;
}
</style>
</head>

<body>
<div class="container">

<h1>🕵️ Imposter Game</h1>

<div id="setup">
  <div id="players"></div>
  <button onclick="addPlayer()">+ Player</button>

  <h3>Imposters</h3>
  <input id="imposterCount" type="number" value="1" min="1">

  <h3>Categories</h3>
  <button onclick="toggleAll(true)">Select All</button>
  <button onclick="toggleAll(false)">Clear</button>
  <div id="categoryList">Loading...</div>

  <h3>
    <label>
      <input type="checkbox" id="imposterClue">
      Give imposters a clue
    </label>
  </h3>

  <button onclick="startGame()">Start</button>
</div>

<div id="revealScreen" class="hidden">
  <h3 id="playerTurn"></h3>
  <button onclick="reveal()">Reveal</button>
  <p id="roleText"></p>
  <button onclick="next()" id="nextBtn" class="hidden">Next</button>
</div>

</div>

<script>
let players = [];
let imposters = [];
let current = 0;
let wordObj;
let categories = [];

const categoryFiles = [
  "categories/animals.json",
  "categories/food.json",
  "categories/objects.json",
  "categories/adult.json",
  "categories/anime.json",
  "categories/bodyandhealth.json",
  "categories/brands.json",
  "categories/characters.json",
  "categories/drink.json",
  "categories/everyday_life.json",
  "categories/fameous_persons.json",
  "categories/jobs.json",
  "categories/moviesandshows.json",
  "categories/music.json",
  "categories/sports.json"
];

// LOAD CATEGORIES
async function loadCategories() {
  let container = document.getElementById("categoryList");
  container.innerHTML = "Loading...";

  categories = [];

  for (let file of categoryFiles) {
    try {
      let res = await fetch(file);
      if (!res.ok) throw new Error();

      let data = await res.json();
      if (!data.name || !data.words) continue;

      categories.push(data);

    } catch (err) {
      console.error("Failed loading:", file);
    }
  }

  // Render checkboxes
  container.innerHTML = "";

  if (categories.length === 0) {
    container.innerHTML = "No categories found";
    return;
  }

  categories.forEach((cat, i) => {
    let div = document.createElement("div");

    div.innerHTML = `
      <label>
        <input type="checkbox" value="${i}">
        ${cat.name}
      </label>
    `;

    container.appendChild(div);
  });
}

loadCategories();

// PLAYERS (saved)
window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("players"));
  if (saved) saved.forEach(n => addPlayer(n));
  else { addPlayer(); addPlayer(); addPlayer(); }
};

function addPlayer(name="") {
  let div = document.createElement("div");
  div.innerHTML = `<input value="${name}" placeholder="Name">`;
  document.getElementById("players").appendChild(div);
}

function toggleAll(state) {
  document.querySelectorAll("#categoryList input")
    .forEach(cb => cb.checked = state);
}

function startGame() {
  players = [];
  document.querySelectorAll("#players input").forEach(i => {
    if (i.value.trim()) players.push(i.value.trim());
  });

  if (players.length < 3) return alert("Need 3+ players");

  localStorage.setItem("players", JSON.stringify(players));

  let impCount = +document.getElementById("imposterCount").value;
  if (impCount >= players.length) return alert("Too many imposters");

  imposters = [];
  while (imposters.length < impCount) {
    let r = Math.floor(Math.random() * players.length);
    if (!imposters.includes(r)) imposters.push(r);
  }

  // GET SELECTED CATEGORIES
  let checked = document.querySelectorAll("#categoryList input:checked");

  if (checked.length === 0) {
    alert("Select at least one category!");
    return;
  }

  // MERGE WORDS
  let allWords = [];

  checked.forEach(cb => {
    let cat = categories[cb.value];
    allWords = allWords.concat(cat.words);
  });

  wordObj = allWords[Math.floor(Math.random() * allWords.length)];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("revealScreen").classList.remove("hidden");

  current = 0;
  showPlayer();
}

function showPlayer() {
  document.getElementById("playerTurn").innerText =
    players[current] + "'s turn";
  document.getElementById("roleText").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function reveal() {
  let giveClue = document.getElementById("imposterClue").checked;

  if (imposters.includes(current)) {
    let text = "😈 IMPOSTER";
    if (giveClue && wordObj.clue) {
      text += "\nClue: " + wordObj.clue;
    }
    document.getElementById("roleText").innerText = text;
  } else {
    document.getElementById("roleText").innerText =
      "🟢 Word: " + wordObj.word;
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

function next() {
  current++;
  if (current >= players.length) {
    alert("Start clue phase!");
    location.reload();
  } else {
    showPlayer();
  }
}
</script>

</body>
</html>
