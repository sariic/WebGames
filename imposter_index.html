<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imposter Game</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

button, select, input {
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

.hidden { display: none; }
</style>
</head>

<body>
<div class="container">

<h1>🕵️ Imposter Game</h1>

<div id="setup">
  <div id="players"></div>
  <button onclick="addPlayer()">+ Player</button>

  <h3>Imposters</h3>
  <input id="imposterCount" type="number" value="1" min="1">

  <h3>Category</h3>
  <select id="categorySelect"></select>

  <h3>
    <label>
      <input type="checkbox" id="imposterClue">
      Give imposters a clue
    </label>
  </h3>

  <button onclick="startGame()">Start</button>
</div>

<div id="revealScreen" class="hidden">
  <h3 id="playerTurn"></h3>
  <button onclick="reveal()">Reveal</button>
  <p id="roleText"></p>
  <button onclick="next()" id="nextBtn" class="hidden">Next</button>
</div>

</div>

<script>
let players = [];
let imposters = [];
let current = 0;
let wordObj;
let categories = [];

const categoryFiles = [
  "categories/animals.json",
  "categories/food.json",
  "categories/objects.json"
];

// LOAD CATEGORIES
async function loadCategories() {
  for (let file of categoryFiles) {
    let res = await fetch(file);
    let data = await res.json();
    categories.push(data);
  }

  let select = document.getElementById("categorySelect");
  categories.forEach((cat, i) => {
    select.innerHTML += `<option value="${i}">${cat.name}</option>`;
  });
}

loadCategories();

// PLAYERS (saved)
window.onload = () => {
  let saved = JSON.parse(localStorage.getItem("players"));
  if (saved) saved.forEach(n => addPlayer(n));
  else { addPlayer(); addPlayer(); addPlayer(); }
};

function addPlayer(name="") {
  let div = document.createElement("div");
  div.innerHTML = `<input value="${name}" placeholder="Name">`;
  document.getElementById("players").appendChild(div);
}

function startGame() {
  players = [];
  document.querySelectorAll("#players input").forEach(i => {
    if (i.value.trim()) players.push(i.value.trim());
  });

  if (players.length < 3) return alert("Need 3+ players");

  localStorage.setItem("players", JSON.stringify(players));

  let impCount = +document.getElementById("imposterCount").value;
  if (impCount >= players.length) return alert("Too many imposters");

  imposters = [];
  while (imposters.length < impCount) {
    let r = Math.floor(Math.random() * players.length);
    if (!imposters.includes(r)) imposters.push(r);
  }

  // PICK WORD FROM CATEGORY
  let catIndex = document.getElementById("categorySelect").value;
  let cat = categories[catIndex];
  wordObj = cat.words[Math.floor(Math.random() * cat.words.length)];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("revealScreen").classList.remove("hidden");

  showPlayer();
}

function showPlayer() {
  document.getElementById("playerTurn").innerText =
    players[current] + "'s turn";
  document.getElementById("roleText").innerText = "";
  document.getElementById("nextBtn").classList.add("hidden");
}

function reveal() {
  let giveClue = document.getElementById("imposterClue").checked;

  if (imposters.includes(current)) {
    let text = "😈 IMPOSTER";
    if (giveClue && wordObj.clue) {
      text += "\nClue: " + wordObj.clue;
    }
    document.getElementById("roleText").innerText = text;
  } else {
    document.getElementById("roleText").innerText =
      "🟢 Word: " + wordObj.word;
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

function next() {
  current++;
  if (current >= players.length) {
    alert("Start clue phase!");
    location.reload();
  } else showPlayer();
}
</script>

</body>
</html>
